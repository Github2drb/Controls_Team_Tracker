<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Report — DRB TechVerse</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .scrollbar-thin::-webkit-scrollbar { height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .weekend-col { opacity: 0.45; }
  .today-col { background: rgba(59,130,246,0.08); }
  .status-site   { background:#312e81; color:#a5b4fc; border:1px solid #4338ca; }
  .status-leave  { background:#7f1d1d; color:#fca5a5; border:1px solid #991b1b; }
  .status-rh     { background:#78350f; color:#fcd34d; border:1px solid #92400e; }
  .status-cl     { background:#581c87; color:#d8b4fe; border:1px solid #7e22ce; }
  .status-el     { background:#1e3a5f; color:#7dd3fc; border:1px solid #1d4ed8; }
  .status-coff   { background:#064e3b; color:#6ee7b7; border:1px solid #065f46; }
  .status-office { background:#1e3a5f; color:#93c5fd; border:1px solid #1d4ed8; }
  .status-wp     { background:#14532d; color:#86efac; border:1px solid #15803d; }
  .status-fh     { background:#4a1942; color:#f0abfc; border:1px solid #86198f; }
  td, th { white-space: nowrap; }
</style>
</head>
<body class="bg-slate-900 min-h-screen text-white">

<!-- Nav bar (matches main app) -->
<nav class="bg-slate-900 border-b border-slate-700 px-6 py-3 flex items-center gap-6 sticky top-0 z-40">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-sm">D</div>
    <span class="font-semibold text-white">DRB TechVerse</span>
  </div>
  <a href="/" class="text-slate-300 hover:text-white text-sm font-medium transition">Daily Report</a>
  <div class="flex-1"></div>
  <button id="adminToggleBtn" onclick="openAdminModal()"
    class="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition">
    🔐 Admin Mode
  </button>
  <a href="/" class="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition">
    ← Back
  </a>
</nav>

<!-- Admin Modal -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-slate-800 border border-slate-600 rounded-xl shadow-2xl w-full max-w-sm p-6">
    <h2 class="text-lg font-bold mb-1 flex items-center gap-2">🔐 Admin Login</h2>
    <p id="authLoadingMsg" class="text-slate-400 text-sm mb-4">Loading credentials…</p>
    <div id="authFields">
      <label class="block text-xs font-medium text-slate-400 mb-1">Username</label>
      <input id="unInput" type="text" placeholder="e.g. admin" autocomplete="username"
        class="w-full px-3 py-2 bg-slate-700 border border-slate-500 rounded-lg text-sm mb-3 outline-none focus:border-blue-500 transition"
        onkeydown="modalKey(event)" />
      <label class="block text-xs font-medium text-slate-400 mb-1">Password</label>
      <input id="pwInput" type="password" placeholder="Enter password" autocomplete="current-password"
        class="w-full px-3 py-2 bg-slate-700 border border-slate-500 rounded-lg text-sm mb-1 outline-none focus:border-blue-500 transition"
        onkeydown="modalKey(event)" />
      <p id="authError" class="text-red-400 text-xs mb-4 min-h-[18px]"></p>
      <div class="flex gap-3">
        <button onclick="closeAdminModal()" class="flex-1 px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded-lg text-sm font-medium transition">Cancel</button>
        <button id="loginBtn" onclick="submitLogin()" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition">Login</button>
      </div>
    </div>
  </div>
</div>

<!-- Main content -->
<div class="max-w-full px-6 py-6">

  <!-- Header row -->
  <div class="flex items-start justify-between mb-4 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold">Daily Report</h1>
      <p class="text-slate-400 text-sm" id="reportSubtitle">Engineer site &amp; attendance tracker</p>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <span id="adminBadge" class="hidden px-3 py-1 bg-blue-600 rounded-full text-xs font-semibold">🔓 Admin</span>
      <span id="lockBadge" class="px-3 py-1 bg-slate-700 rounded-full text-xs text-slate-400">🔒 View only</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="flex items-center gap-2 mb-5 flex-wrap">
    <span class="text-slate-400 text-sm font-medium">Legend:</span>
    <span class="status-site   px-2 py-0.5 rounded text-xs font-medium">🖥 Site</span>
    <span class="status-leave  px-2 py-0.5 rounded text-xs font-medium">Leave</span>
    <span class="status-rh     px-2 py-0.5 rounded text-xs font-medium">RH</span>
    <span class="status-cl     px-2 py-0.5 rounded text-xs font-medium">CL</span>
    <span class="status-el     px-2 py-0.5 rounded text-xs font-medium">EL</span>
    <span class="status-coff   px-2 py-0.5 rounded text-xs font-medium">COff</span>
    <span class="status-wp     px-2 py-0.5 rounded text-xs font-medium">WP+</span>
    <span class="status-fh     px-2 py-0.5 rounded text-xs font-medium">FH</span>
    <span class="px-2 py-0.5 rounded text-xs font-medium bg-blue-600">📅 Today</span>
  </div>

  <!-- Month nav -->
  <div class="flex items-center gap-3 mb-4">
    <button onclick="shiftMonth(-1)" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition">&#8249;</button>
    <span id="monthLabel" class="text-sm font-semibold text-white min-w-[120px] text-center"></span>
    <button onclick="shiftMonth(1)"  class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition">&#8250;</button>
    <button onclick="goCurrentMonth()" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs transition">This Month</button>
    <span id="savingDot" class="hidden w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
  </div>

  <!-- Summary chips -->
  <div id="summaryStrip" class="flex gap-2 flex-wrap mb-4"></div>

  <!-- Calendar table -->
  <div class="overflow-x-auto scrollbar-thin rounded-xl border border-slate-700">
    <table class="w-full text-sm border-collapse">
      <thead id="calHead" class="bg-slate-800 text-slate-400 text-xs uppercase"></thead>
      <tbody id="calBody" class="divide-y divide-slate-700/50"></tbody>
    </table>
  </div>

  <!-- Admin action bar -->
  <div id="actionBar" class="hidden mt-5 flex gap-3 flex-wrap items-center">
    <button onclick="saveAll()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition flex items-center gap-2">
      💾 Save attendance
    </button>
    <button onclick="exportCSV()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition">
      ⬇ Export CSV
    </button>
    <span id="saveStatus" class="text-slate-400 text-xs"></span>
  </div>
  <div id="viewBar" class="mt-5 flex gap-3">
    <button onclick="exportCSV()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition">⬇ Export CSV</button>
  </div>

</div>

<!-- Status picker popup -->
<div id="pickerPopup" class="hidden fixed z-50 bg-slate-800 border border-slate-600 rounded-xl shadow-2xl p-3 min-w-[200px]">
  <p class="text-xs text-slate-400 mb-2 font-medium" id="pickerLabel"></p>
  <div id="pickerOptions" class="grid grid-cols-2 gap-1.5"></div>
  <button onclick="closePicker()" class="mt-2 w-full text-xs text-slate-500 hover:text-slate-300 py-1">Close</button>
</div>

<div id="toast" class="fixed bottom-5 right-5 z-50 bg-slate-700 text-white text-sm px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity pointer-events-none"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const AUTH_URL = "https://raw.githubusercontent.com/Github2drb/Controls_Team_Tracker/main/engineers_auth.json";
const ENG_URL  = "https://raw.githubusercontent.com/Github2drb/Controls_Team_Tracker/main/engineers_master_list.json";
const SITES_URL= "https://raw.githubusercontent.com/Github2drb/Controls_Team_Tracker/main/customer_sites_master_list.json";

const STATUSES = [
  { key:"Office",     label:"Office",     css:"status-office" },
  { key:"Site Visit", label:"🖥 Site",    css:"status-site"   },
  { key:"CL",         label:"CL",         css:"status-cl"     },
  { key:"C/Off",      label:"COff",       css:"status-coff"   },
  { key:"EL",         label:"EL",         css:"status-el"     },
  { key:"FH",         label:"FH",         css:"status-fh"     },
  { key:"WP+",        label:"WP+",        css:"status-wp"     },
  { key:"Leave",      label:"Leave",      css:"status-leave"  },
  { key:"RH",         label:"RH",         css:"status-rh"     },
];

const FALLBACK_ENG = [
  {id:"eng-3", name:"Praveen Kumar C",       initials:"PKC"},
  {id:"eng-5", name:"Santhosh N",            initials:"SN"},
  {id:"eng-6", name:"Dyumith NV",            initials:"DN"},
  {id:"eng-7", name:"Sushanth K M",          initials:"SKM"},
  {id:"eng-10",name:"Dhanesh M",             initials:"DM"},
  {id:"eng-11",name:"Harsha",                initials:"H"},
  {id:"eng-12",name:"Veeresh M",             initials:"VM"},
  {id:"eng-13",name:"Keerthi BH",            initials:"KB"},
  {id:"eng-14",name:"Deekshitha HC",         initials:"DH"},
  {id:"eng-16",name:"Ramkumar Annamalai",    initials:"RA"},
  {id:"eng-17",name:"Eswanth Potnuri",       initials:"EP"},
  {id:"eng-18",name:"Rahul (Ampere)",        initials:"RA"},
  {id:"eng-19",name:"Harsha (Ampere)",       initials:"HA"},
  {id:"eng-20",name:"Sumanjali",             initials:"SU"},
  {id:"eng-21",name:"Vishnu (PAES)",         initials:"V"},
  {id:"eng-22",name:"Sarath (PAES)",         initials:"S"},
  {id:"eng-23",name:"Mallikarjun (D.I.C.S)", initials:"M"},
  {id:"eng-24",name:"Kiran (D.I.C.S)",       initials:"K"},
];
const FALLBACK_ADMINS = [
  {username:"admin",   password:"admin@drb",  name:"Admin"},
  {username:"kavitha", password:"kavitha@123", name:"Kavitha"}
];

// ── State ─────────────────────────────────────────────────────────────────────
let engineers  = [];
let adminUsers = [];
let attendance = {};   // keyed by YYYY-MM-DD -> { [engId]: {status, site, remark} }
let adminMode  = false;
let loggedInAs = "";
let viewYear, viewMonth;  // 0-based month

const today      = new Date();
const todayStr   = dateStr(today);

// picker state
let pickerEngId = null, pickerDateStr = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  const now = new Date();
  viewYear  = now.getFullYear();
  viewMonth = now.getMonth();

  // restore session
  if(sessionStorage.getItem("drb_admin")==="1"){
    adminMode  = true;
    loggedInAs = sessionStorage.getItem("drb_admin_name")||"Admin";
  }

  applyAdminUI();
  engineers = await fetchEngineers();
  loadMonthData();
  renderCalendar();
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchAdmins(){
  try{
    const r = await fetch(AUTH_URL+"?t="+Date.now());
    if(!r.ok) throw 0;
    const d = await r.json();
    const list = d.engineers||d;
    const admins = list.filter(u=>u.role==="admin"&&u.isActive!==false);
    return admins.length ? admins : FALLBACK_ADMINS;
  }catch{ return FALLBACK_ADMINS; }
}

async function fetchEngineers(){
  try{
    const r = await fetch(ENG_URL+"?t="+Date.now());
    if(!r.ok) throw 0;
    const d = await r.json();
    if(Array.isArray(d))  return d.map(e=>typeof e==="string"?{id:e,name:e,initials:e.slice(0,2).toUpperCase()}:e);
    if(d.engineers)       return d.engineers;
    return FALLBACK_ENG;
  }catch{ return FALLBACK_ENG; }
}

// ── Storage ───────────────────────────────────────────────────────────────────
function monthKey(y,m){ return `drb_att_${y}_${String(m+1).padStart(2,'0')}`; }

function loadMonthData(){
  attendance={};
  try{
    const raw=localStorage.getItem(monthKey(viewYear,viewMonth));
    if(raw) attendance=JSON.parse(raw);
  }catch{}
}

function saveAll(){
  if(!adminMode) return;
  try{
    localStorage.setItem(monthKey(viewYear,viewMonth),JSON.stringify(attendance));
    toast("✓ Saved");
    document.getElementById("saveStatus").textContent="Saved at "+new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
  }catch(e){ toast("Save failed"); }
}

// ── Admin auth ────────────────────────────────────────────────────────────────
async function openAdminModal(){
  if(adminMode){ lockAdmin(); return; }
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("authLoadingMsg").textContent="⏳ Loading credentials…";
  document.getElementById("loginBtn").disabled=true;
  document.getElementById("unInput").value="";
  document.getElementById("pwInput").value="";
  document.getElementById("authError").textContent="";
  adminUsers = await fetchAdmins();
  document.getElementById("authLoadingMsg").textContent="Enter your admin credentials.";
  document.getElementById("loginBtn").disabled=false;
  setTimeout(()=>document.getElementById("unInput").focus(),50);
}

function closeAdminModal(){
  document.getElementById("adminModal").classList.add("hidden");
}

function modalKey(e){
  if(e.key==="Enter")  submitLogin();
  if(e.key==="Escape") closeAdminModal();
}

function submitLogin(){
  const un = document.getElementById("unInput").value.trim().toLowerCase();
  const pw = document.getElementById("pwInput").value;
  const err= document.getElementById("authError");

  if(!un||!pw){ err.textContent="Username and password required."; return; }

  const match = adminUsers.find(u=>
    (u.username||"").toLowerCase()===un && u.password===pw
  );

  if(match){
    adminMode=true;
    loggedInAs=match.name||match.username;
    sessionStorage.setItem("drb_admin","1");
    sessionStorage.setItem("drb_admin_name",loggedInAs);
    closeAdminModal();
    applyAdminUI();
    renderCalendar();
    toast("✓ Welcome, "+loggedInAs);
  } else {
    err.textContent="Incorrect username or password. Try again.";
    document.getElementById("pwInput").value="";
    document.getElementById("pwInput").focus();
  }
}

function lockAdmin(){
  adminMode=false; loggedInAs="";
  sessionStorage.removeItem("drb_admin");
  sessionStorage.removeItem("drb_admin_name");
  applyAdminUI();
  renderCalendar();
  toast("🔒 Locked");
}

function applyAdminUI(){
  const badge  = document.getElementById("adminBadge");
  const lock   = document.getElementById("lockBadge");
  const btn    = document.getElementById("adminToggleBtn");
  const actBar = document.getElementById("actionBar");
  const vwBar  = document.getElementById("viewBar");

  if(adminMode){
    badge.textContent="🔓 "+loggedInAs;
    badge.classList.remove("hidden");
    lock.classList.add("hidden");
    btn.textContent="🔒 Lock";
    btn.classList.replace("bg-slate-700","bg-blue-700");
    actBar.classList.remove("hidden");
    vwBar.classList.add("hidden");
  } else {
    badge.classList.add("hidden");
    lock.classList.remove("hidden");
    btn.textContent="🔐 Admin Mode";
    btn.classList.replace("bg-blue-700","bg-slate-700");
    actBar.classList.add("hidden");
    vwBar.classList.remove("hidden");
  }
}

// ── Calendar render ───────────────────────────────────────────────────────────
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function dateStr(d){ return d.toISOString().split("T")[0]; }
function isWeekend(y,m,day){ const dow=new Date(y,m,day).getDay(); return dow===0||dow===6; }
function dayAbbr(y,m,day){ return ["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(y,m,day).getDay()]; }

function renderCalendar(){
  const days = daysInMonth(viewYear, viewMonth);
  const monthName = new Date(viewYear,viewMonth,1).toLocaleString("en-IN",{month:"long",year:"numeric"});
  document.getElementById("monthLabel").textContent = monthName;
  document.getElementById("reportSubtitle").textContent =
    "Engineer site & attendance tracker — "+new Date(viewYear,viewMonth,1).toLocaleString("en-IN",{month:"long",year:"numeric"});

  // Header
  const head = document.getElementById("calHead");
  let hRow = `<tr>
    <th class="px-3 py-2 text-left sticky left-0 bg-slate-800 z-10 min-w-[160px]">ENGINEER</th>`;
  for(let d=1;d<=days;d++){
    const ds=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=ds===todayStr;
    const wknd=isWeekend(viewYear,viewMonth,d);
    hRow+=`<th class="px-2 py-2 text-center text-xs ${wknd?"weekend-col":""} ${isToday?"bg-blue-900/50":""}" style="min-width:54px">
      <div>${dayAbbr(viewYear,viewMonth,d)}</div>
      <div class="text-white font-bold">${d}</div>
    </th>`;
  }
  hRow+=`</tr>`;
  head.innerHTML=hRow;

  // Body
  const body = document.getElementById("calBody");
  let html="";
  for(const eng of engineers){
    const eid=eng.id||eng.name;
    html+=`<tr class="hover:bg-slate-800/50 transition">
      <td class="px-3 py-2 sticky left-0 bg-slate-900 z-10">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-300 flex-shrink-0">${eng.initials||eng.name.slice(0,2).toUpperCase()}</div>
          <span class="text-sm font-medium text-slate-200">${eng.name}</span>
        </div>
      </td>`;
    for(let d=1;d<=days;d++){
      const ds=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const a=(attendance[ds]||{})[eid]||{};
      const isToday=ds===todayStr;
      const wknd=isWeekend(viewYear,viewMonth,d);
      const st=STATUSES.find(s=>s.key===a.status);
      const cellContent = st
        ? `<span class="${st.css} px-1.5 py-0.5 rounded text-xs font-medium cursor-pointer"
             onclick="openPicker('${eid}','${ds}',event)">${st.label}${a.site?`<br><span style="font-size:10px;opacity:.8">${a.site}</span>`:""}</span>`
        : (adminMode&&!wknd
          ? `<span class="text-slate-600 hover:text-slate-400 cursor-pointer text-lg leading-none" onclick="openPicker('${eid}','${ds}',event)">—</span>`
          : `<span class="text-slate-700 text-sm">—</span>`);

      html+=`<td class="px-1 py-1.5 text-center ${wknd?"weekend-col":""} ${isToday?"today-col":""}">${cellContent}</td>`;
    }
    html+=`</tr>`;
  }
  body.innerHTML=html;
  renderSummary();
}

// ── Status picker ─────────────────────────────────────────────────────────────
function openPicker(eid, ds, evt){
  if(!adminMode) return;
  pickerEngId=eid; pickerDateStr=ds;
  const eng=engineers.find(e=>(e.id||e.name)===eid);
  document.getElementById("pickerLabel").textContent=(eng?.name||eid)+" · "+ds;

  const cur=(attendance[ds]||{})[eid]||{};
  const opts=document.getElementById("pickerOptions");
  opts.innerHTML=STATUSES.map(s=>`
    <button onclick="setStatus('${eid}','${ds}','${s.key}')"
      class="${s.css} px-2 py-1 rounded text-xs font-medium text-left hover:opacity-80 transition ${cur.status===s.key?"ring-2 ring-white":""}">
      ${s.label}
    </button>`).join("")
    +`<button onclick="setStatus('${eid}','${ds}','')"
      class="bg-slate-700 text-slate-300 px-2 py-1 rounded text-xs font-medium hover:bg-slate-600 transition col-span-2">
      ✕ Clear
    </button>`;

  const popup=document.getElementById("pickerPopup");
  popup.classList.remove("hidden");
  const rect=evt.target.getBoundingClientRect();
  const popupH=popup.offsetHeight||160;
  const popupW=popup.offsetWidth||220;

  // Prefer above the cell; fall back to below if not enough space
  let top = rect.top+window.scrollY - popupH - 6;
  if(top < window.scrollY+8) top = rect.bottom+window.scrollY+6;

  // Align to left of cell; shift left if it overflows right edge
  let left = rect.left+window.scrollX;
  if(left+popupW > window.innerWidth-8) left = window.innerWidth - popupW - 8;
  if(left < 8) left = 8;

  popup.style.top=top+"px";
  popup.style.left=left+"px";
  evt.stopPropagation();
}

function closePicker(){
  document.getElementById("pickerPopup").classList.add("hidden");
  pickerEngId=null; pickerDateStr=null;
}

document.addEventListener("click", e=>{
  if(!document.getElementById("pickerPopup").contains(e.target)) closePicker();
});

function setStatus(eid, ds, statusKey){
  if(!adminMode) return;
  if(!attendance[ds]) attendance[ds]={};
  if(!statusKey){ delete attendance[ds][eid]; }
  else { attendance[ds][eid]={status:statusKey}; }
  closePicker();
  renderCalendar();
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(){
  const todayAtt=attendance[todayStr]||{};
  const cnt={};
  Object.values(todayAtt).forEach(a=>{ if(a.status) cnt[a.status]=(cnt[a.status]||0)+1; });
  const marked=Object.keys(cnt).length?Object.values(cnt).reduce((a,b)=>a+b,0):0;
  const s=STATUSES;
  const chips=`<span class="px-2 py-1 bg-slate-700 rounded text-xs text-slate-300">${marked}/${engineers.length} today</span>`+
    Object.entries(cnt).map(([k,v])=>{
      const st=s.find(x=>x.key===k);
      return st?`<span class="${st.css} px-2 py-1 rounded text-xs">${st.label}: ${v}</span>`:"";
    }).join("");
  document.getElementById("summaryStrip").innerHTML=chips;
}

// ── Month nav ─────────────────────────────────────────────────────────────────
function shiftMonth(n){
  viewMonth+=n;
  if(viewMonth<0){ viewMonth=11; viewYear--; }
  if(viewMonth>11){ viewMonth=0; viewYear++; }
  loadMonthData();
  renderCalendar();
}
function goCurrentMonth(){
  viewYear=today.getFullYear(); viewMonth=today.getMonth();
  loadMonthData(); renderCalendar();
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const days=daysInMonth(viewYear,viewMonth);
  const dates=Array.from({length:days},(_,i)=>{
    return `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
  });
  const rows=[["Engineer",...dates]];
  for(const eng of engineers){
    const eid=eng.id||eng.name;
    rows.push([eng.name,...dates.map(ds=>((attendance[ds]||{})[eid]||{}).status||"")]);
  }
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`attendance_${viewYear}_${String(viewMonth+1).padStart(2,"0")}.csv`;
  a.click();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.style.opacity="1";
  setTimeout(()=>el.style.opacity="0",2200);
}

init();
</script>
